<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electronic Picnic — Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes floatSlow { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-6px) translateX(4px)} }
    @keyframes noteFloat { 0%{transform:translateY(0) rotate(0deg);opacity:.7} 50%{transform:translateY(-15px) rotate(10deg);opacity:1} 100%{transform:translateY(0) rotate(0deg);opacity:.7} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .float-anim{animation:float 4s ease-in-out infinite}
    .float-slow{animation:floatSlow 6s ease-in-out infinite}
    .note-float{animation:noteFloat 3s ease-in-out infinite}
    .pulse-anim{animation:pulse 2s ease-in-out infinite}
    .cta-btn{background:#F28C28;color:#fff;border:none;padding:16px 36px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 15px rgba(242,140,40,.4);text-decoration:none;display:inline-block;text-align:center}
    .cta-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(242,140,40,.5);filter:brightness(1.08)}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Nunito',sans-serif;color:#333;overflow-x:hidden;background-color:#FFFFFF}
    ::-webkit-scrollbar{width:8px}
    ::-webkit-scrollbar-track{background:#f1f1f1}
    ::-webkit-scrollbar-thumb{background:#2AABB3;border-radius:4px}
    .dj-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:16px;padding:0 16px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .dj-carousel::-webkit-scrollbar{display:none}
    .dj-carousel>div{scroll-snap-align:start;flex-shrink:0}
    @media(max-width:767px){.desktop-only{display:none!important}}
    @media(min-width:768px){.mobile-only{display:none!important}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    /* Lucide icons - inline SVG components */
    const Icon = ({d, size=24, color="currentColor", style={}}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>{d}</svg>
    );
    const Globe = ({size=24,color="currentColor",style={}}) => <Icon size={size} color={color} style={style} d={<><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></>}/>;
    const ChevronDown = ({size=24,color="currentColor",style={},className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style} className={className}><path d="m6 9 6 6 6-6"/></svg>;
    const Music = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
    const Palette = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill={color}/><circle cx="17.5" cy="10.5" r=".5" fill={color}/><circle cx="8.5" cy="7.5" r=".5" fill={color}/><circle cx="6.5" cy="12.5" r=".5" fill={color}/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
    const Wine = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 22h8"/><path d="M7 10h10"/><path d="M12 15v7"/><path d="M12 15a5 5 0 0 0 5-5c0-2-.5-4-2-8H9c-1.5 4-2 6-2 8a5 5 0 0 0 5 5z"/></svg>;
    const ShoppingBag = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
    const Bus = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/></svg>;
    const Car = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>;
    const Instagram = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>;
    const Check = ({size=24,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>;

    /* ─── Language Context ─── */
    const LangContext = createContext();
    const useLang = () => useContext(LangContext);

    const COLORS = { cyan:"#87CEEB", green:"#368a1b", siteBg:"#FFFFFF", orange:"#F28C28", teal:"#2AABB3", nightBlue:"#2D2B6B", white:"#FFFFFF", textLight:"#333333", textDark:"#F0F0F0" };

    const texts = {
      nav: { concetto:{it:"Il concetto",en:"The concept"}, programma:{it:"Programma",en:"Schedule"}, mercatini:{it:"Mercatini",en:"Markets"}, workshop:{it:"Workshop",en:"Workshops"}, come_arrivare:{it:"Come arrivare",en:"Getting there"}, prezzi:{it:"Prezzi",en:"Prices"}, musica:{it:"Musica",en:"Music"}, prenota:{it:"Prenota",en:"Book now"} },
      hero: { title:{it:"Electronic Picnic",en:"Electronic Picnic"}, subtitle:{it:"Dal picnic al dancefloor. Una giornata che evolve con te.",en:"From picnic to dancefloor. A day that evolves with you."}, info:{it:"1 Maggio 2026 — Avalon Wellness Spa, Carso — Trieste",en:"May 1, 2026 — Avalon Wellness Spa, Karst — Trieste"}, cta:{it:"Prenota il tuo picnic",en:"Book your picnic"} },
      concetto: { title:{it:"Un'esperienza che evolve",en:"An experience that evolves"}, text:{it:"C'è un posto sul Carso triestino dove, ogni anno il Primo Maggio, il tempo rallenta.\nElectronic Pic Nic è un evento collettivo e itinerante nello spirito: un grande pic nic condiviso all'aperto, con musica elettronica live, workshop creativi, mercatini di artigianato selezionato e un'atmosfera che mescola natura, cultura e comunità.\n\nUn'esperienza ormai consolidata che ogni edizione porta con sé nuovi artisti, nuovi artigiani e nuove persone — ma sempre lo stesso filo: stare insieme, fuori, bene.\n\nOrganizzato da ON CIRCLE presso l'Avalon Wellness Spa immersa nel verde del Carso, Electronic Pic Nic è il festival di primavera che Trieste aspetta.",en:"There's a place on the Karst plateau near Trieste where, every year on May Day, time slows down.\nElectronic Pic Nic is a collective, free-spirited event: a big shared outdoor picnic with live electronic music, creative workshops, curated artisan markets, and an atmosphere that blends nature, culture, and community.\n\nA well-established experience that each edition brings new artists, new artisans, and new people — but always the same thread: being together, outdoors, feeling good.\n\nOrganized by ON CIRCLE at Avalon Wellness Spa, nestled in the green Karst hills, Electronic Pic Nic is the spring festival Trieste looks forward to."} },
      programma: { title:{it:"Programma della giornata",en:"Daily schedule"}, items:[ {time:"11:00",it:"Corsa con Cavana Run Club",en:"Run with Cavana Run Club"}, {time:"12:00",it:"Apertura ufficiale + inizio musica",en:"Official opening + music starts"}, {time:"11:00 – 13:30",it:"Area picnic riservata (prenotati)",en:"Reserved picnic area (booked)"}, {time:"12:00 – 15:00",it:"Workshop (3 sessioni a rotazione)",en:"Workshops (3 rotating sessions)"}, {time:"12:00 – 16:00",it:"Mercatini aperti (~30 espositori)",en:"Markets open (~30 vendors)"}, {time:"12:00 → fine",it:"DJ Set live continuo",en:"Continuous live DJ Set"} ] },
      mercatini: { title:{it:"Mercatini artigianali",en:"Artisan markets"}, text:{it:"L'area mercatini è uno dei cuori pulsanti di Electronic Pic Nic. Ogni anno, circa 30 tra artigiani, artisti e brand selezionati portano il meglio della loro produzione in uno spazio curato, conviviale e completamente immerso nella natura.\n\nNon un semplice mercato — una piccola comunità creativa temporanea, dove ogni banchetto racconta una storia e ogni oggetto è fatto con intenzione.",en:"The market area is one of the beating hearts of Electronic Pic Nic. Every year, around 30 selected artisans, artists, and brands bring the best of their work to a curated, convivial space fully immersed in nature.\n\nNot just a market — a small temporary creative community, where every stall tells a story and every object is made with intention."}, vendors:[{ name: "Renditi Conto Bijoux", desc: { it: "Bijoux artigianali e accessori unici", en: "Handcrafted bijoux and unique accessories" }, logo: "public/assets/mercatini/Renditi_Conto_Bijoux.png" },{ name: "Melanie Zullie", desc: { it: "Creazioni artistiche e design originale", en: "Artistic creations and original design" }, logo: "public/assets/mercatini/Melanie_Zullie.png" },{ name: "Little Battle", desc: { it: "Ceramiche e oggetti creativi fatti a mano", en: "Handmade ceramics and creative objects" }, logo: "public/assets/mercatini/Little_Battle.png" },{ name: "Goran Viler Hair Spa", desc: { it: "Prodotti professionali per la cura dei capelli", en: "Professional hair care products" }, logo: "public/assets/mercatini/Goran_Viler_Hair_Spa.png" },{ name: "Galleria Battisti 14", desc: { it: "Arte, stampe e oggetti d'autore", en: "Art, prints, and designer objects" }, logo: "public/assets/mercatini/Galleria_Battisti_14.png" },{ name: "Bronziska", desc: { it: "Gioielli in bronzo e creazioni uniche", en: "Bronze jewelry and unique creations" }, logo: "public/assets/mercatini/Bronziska.png" }] },
      workshop: { title:{it:"Workshop creativi",en:"Creative workshops"}, subtitle:{it:"3 sessioni a rotazione: 12–13 / 13–14 / 14–15 — 10€ a sessione",en:"3 rotating sessions: 12–13 / 13–14 / 14–15 — €10 per session"}, cards:[ {title:{it:"Ceramica libera",en:"Free ceramics"},by:"Little Battle",desc:{it:"Decorazione e personalizzazione di ceramiche. Esprimi la tua creatività plasmando e dipingendo pezzi unici.",en:"Ceramic decoration and customization. Express your creativity by shaping and painting unique pieces."},icon:"palette"}, {title:{it:"Borsa Crochet",en:"Crochet bag"},by:"Chicca Mutti",desc:{it:"Creazione guidata di una borsa all'uncinetto. Un workshop hands-on per portarti a casa la tua creazione.",en:"Guided crochet bag creation. A hands-on workshop to take home your own creation."},icon:"shopping"}, {title:{it:"Wine Experience",en:"Wine Experience"},by:{it:"Sommelier (TBD)",en:"Sommelier (TBD)"},desc:{it:"Degustazione guidata con lettura sensoriale del vino. Un viaggio tra i sapori del territorio.",en:"Guided tasting with sensory wine reading. A journey through local flavors."},icon:"wine"} ] },
      comeArrivare: { title:{it:"Come arrivare",en:"Getting there"}, bus:{title:{it:"In bus",en:"By bus"},info:{it:"Servizio navetta disponibile. Orari e fermate in arrivo.",en:"Shuttle service available. Times and stops coming soon."}}, auto:{title:{it:"In auto",en:"By car"},address:"Borgo Grotta Gigante, 42/B — Trieste",parking:{it:"Dettagli parcheggio in arrivo.",en:"Parking details coming soon."}} },
      prezzi: { title:{it:"Scegli la tua esperienza",en:"Choose your experience"}, items:[ {name:"Picnic",price:"25€",desc:{it:"Accesso riservato 11:00–13:30, picnic box incluso",en:"Reserved access 11:00–13:30, picnic box included"}}, {name:"Workshop",price:"10€",desc:{it:"Una sessione a scelta (ceramica, crochet, wine)",en:"One session of your choice (ceramics, crochet, wine)"}}, {name:"Picnic + Workshop",price:"30€",desc:{it:"Formula combinata",en:"Combined package"}}, {name:{it:"Ingresso libero",en:"Free entry"},price:{it:"Gratuito",en:"Free"},desc:{it:"Dalle 13:30, mercatini + menu Avalon",en:"From 13:30, markets + Avalon menu"}} ], cta:{it:"Prenota il tuo picnic",en:"Book your picnic"} },
      musica: { title:{it:"I DJ che ci accompagneranno durante la giornata.",en:"The DJs joining us throughout the day."}, desc:{it:"La musica elettronica è l'anima di Electronic Pic Nic. Dal mezzogiorno fino a fine giornata, il suono accompagna ogni momento — dal primo boccone del picnic all'ultima visita ai mercatini. Un sound curato, coerente con l'atmosfera outdoor e con l'energia del Carso.",en:"Electronic music is the soul of Electronic Pic Nic. From noon until the end of the day, the sound accompanies every moment — from the first bite of the picnic to the last visit to the markets. A curated sound, in harmony with the outdoor atmosphere and the energy of the Karst."}, comingSoon:{it:"Lineup completa in arrivo...",en:"Full lineup coming soon..."}, specialGuest:{it:"Special Guest Internazionale",en:"International Special Guest"}, specialGuestSub:{it:"",en:""} },
      form: { title:{it:"Prenota il tuo posto al picnic",en:"Book your picnic spot"}, subtitle:{it:"Ti ricontatteremo per confermare la prenotazione e organizzare il pagamento.",en:"We'll contact you to confirm the booking and arrange payment."}, name:{it:"Nome e Cognome",en:"Full Name"}, email:{it:"Email",en:"Email"}, phone:{it:"Telefono",en:"Phone"}, people:{it:"Numero persone",en:"Number of people"}, submit:{it:"Prenota il tuo picnic",en:"Book your picnic"}, success:{it:"Prenotazione ricevuta! Ti contatteremo per confermare e organizzare il pagamento.",en:"Booking received! We'll contact you to confirm and arrange payment."}, errors:{name:{it:"Inserisci nome e cognome",en:"Please enter your full name"},email:{it:"Inserisci un'email valida",en:"Please enter a valid email"},phone:{it:"Inserisci un numero di telefono",en:"Please enter a phone number"},people:{it:"Seleziona il numero di persone",en:"Please select number of people"}} },
      footer: { social:"@electronic_picnic", partners:{it:"Partner",en:"Partners"}, partnerList:"ON CIRCLE Music, Avalon Wellness & Medical", contact:{it:"Contatti",en:"Contact"}, contactSoon:{it:"In arrivo",en:"Coming soon"} },
    };

    function useInView(threshold=0.15){const ref=useRef(null);const[inView,setInView]=useState(false);useEffect(()=>{const el=ref.current;if(!el)return;const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setInView(true);obs.disconnect()}},{threshold});obs.observe(el);return()=>obs.disconnect()},[threshold]);return[ref,inView]}
    function useIsMobile(bp=768){const[m,setM]=useState(false);useEffect(()=>{const c=()=>setM(window.innerWidth<bp);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c)},[bp]);return m}

    /* ─── LangToggle ─── */
    function LangToggleBtn({scrolled}){const{lang,setLang}=useLang();return <button onClick={()=>setLang(lang==="it"?"en":"it")} style={{background:"rgba(42,171,179,.12)",border:`2px solid ${COLORS.teal}`,borderRadius:20,padding:"6px 14px",color:COLORS.teal,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6}}><Globe size={14}/>{lang==="it"?"EN":"IT"}</button>}

    /* ─── Navbar ─── */
    function Navbar(){const{lang}=useLang();const[scrolled,setScrolled]=useState(false);const t=texts.nav;useEffect(()=>{const h=()=>setScrolled(window.scrollY>50);window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h)},[]);const links=[{href:"#concetto",label:t.concetto[lang]},{href:"#programma",label:t.programma[lang]},{href:"#mercatini",label:t.mercatini[lang]},{href:"#workshop",label:t.workshop[lang]},{href:"#prezzi",label:t.prezzi[lang]},{href:"#musica",label:t.musica[lang]}];const lc=COLORS.textLight;
    return <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,background:scrolled?"rgba(255,255,255,.95)":"rgba(255,255,255,.8)",backdropFilter:"blur(10px)",transition:"all .3s ease",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:scrolled?"0 2px 20px rgba(0,0,0,.1)":"none"}}><a href="#hero" style={{textDecoration:"none",display:"flex",alignItems:"center"}}><img src="public/assets/logo.svg" alt="Electronic Picnic" style={{height:44}}/></a><div style={{display:"flex",alignItems:"center",gap:20}}><div className="desktop-only" style={{display:"flex",gap:18}}>{links.map(l=><a key={l.href} href={l.href} style={{color:lc,textDecoration:"none",fontWeight:600,fontSize:14,transition:"color .3s"}}>{l.label}</a>)}</div><LangToggleBtn scrolled={scrolled}/></div></nav>}

    /* ─── Hero ─── */
    function Hero(){const{lang}=useLang();const t=texts.hero;const m=useIsMobile();
    if(!m){return <section id="hero" style={{position:"relative",minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"flex-start",alignItems:"center",paddingTop:"12vh",overflow:"hidden"}}><img src="public/assets/desktop/hero.webp" alt="" style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",objectFit:"cover",zIndex:0}}/><div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:"linear-gradient(to bottom,rgba(0,0,0,.4) 0%,transparent 100%)",zIndex:1}}/><div style={{position:"relative",zIndex:2,textAlign:"center",padding:"0 24px",maxWidth:700}}><h1 style={{fontFamily:"'Fredoka One',cursive",fontSize:72,color:"white",textShadow:"0 3px 20px rgba(0,0,0,.35)",marginBottom:16,lineHeight:1.1}}>{t.title[lang]}</h1><p style={{fontSize:22,color:"white",textShadow:"0 2px 10px rgba(0,0,0,.3)",marginBottom:12,fontWeight:600,lineHeight:1.4}}>{t.subtitle[lang]}</p><p style={{fontSize:16,color:"rgba(255,255,255,.95)",textShadow:"0 1px 8px rgba(0,0,0,.3)",marginBottom:32,fontWeight:600}}>{t.info[lang]}</p><a href="#form" className="cta-btn pulse-anim" style={{fontSize:20}}>{t.cta[lang]}</a></div><div className="note-float" style={{position:"absolute",zIndex:1,top:"22%",left:"8%",fontSize:28,color:"white",opacity:.5}}>♪</div><div className="note-float" style={{position:"absolute",zIndex:1,top:"16%",right:"10%",fontSize:22,color:"white",opacity:.4,animationDelay:"1s"}}>♫</div><div style={{position:"absolute",bottom:30,zIndex:2}}><ChevronDown size={28} color="white" style={{opacity:.7}} className="float-anim"/></div></section>}
    /* Mobile */
    return <section id="hero" style={{position:"relative",minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"flex-start",alignItems:"center",paddingTop:"12vh",backgroundImage:"url('public/assets/mobile/hero.webp')",backgroundSize:"contain",backgroundPosition:"bottom center",backgroundRepeat:"no-repeat",backgroundColor:COLORS.siteBg}}><div style={{position:"relative",zIndex:2,textAlign:"center",padding:"0 24px",maxWidth:700}}><h1 style={{fontFamily:"'Fredoka One',cursive",fontSize:44,color:COLORS.green,marginBottom:14,lineHeight:1.1}}>{t.title[lang]}</h1><p style={{fontSize:17,color:COLORS.textLight,marginBottom:10,fontWeight:600,lineHeight:1.4}}>{t.subtitle[lang]}</p><p style={{fontSize:14,color:"rgba(51,51,51,.7)",marginBottom:28,fontWeight:600}}>{t.info[lang]}</p><a href="#form" className="cta-btn pulse-anim" style={{fontSize:16}}>{t.cta[lang]}</a></div><div style={{position:"absolute",bottom:30,zIndex:2}}><ChevronDown size={28} color={COLORS.teal} style={{opacity:.7}} className="float-anim"/></div></section>}

    /* ─── Concetto ─── */
    function Concetto(){const{lang}=useLang();const t=texts.concetto;const[ref,inView]=useInView();return <section id="concetto" ref={ref} style={{background:COLORS.white,padding:"80px 24px",display:"flex",justifyContent:"center"}}><div style={{maxWidth:700,textAlign:"center",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(30px)",transition:"all .8s ease"}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:COLORS.green,marginBottom:32}}>{t.title[lang]}</h2><p style={{fontSize:17,lineHeight:1.8,color:COLORS.textLight,whiteSpace:"pre-line"}}>{t.text[lang]}</p></div></section>}

    /* ─── Programma ─── */
    function Programma(){const{lang}=useLang();const t=texts.programma;const[ref,inView]=useInView();return <section id="programma" ref={ref} style={{background:COLORS.white,padding:"80px 24px"}}><div style={{maxWidth:700,margin:"0 auto"}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:COLORS.green,textAlign:"center",marginBottom:48}}>{t.title[lang]}</h2><div style={{position:"relative",paddingLeft:44}}><div style={{position:"absolute",left:14,top:4,bottom:4,width:3,borderRadius:2,background:COLORS.green}}/>{t.items.map((item,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",marginBottom:28,position:"relative",opacity:inView?1:0,transform:inView?"translateX(0)":"translateX(-20px)",transition:`all .5s ease ${i*.1}s`}}><div style={{position:"absolute",left:-37,width:18,height:18,borderRadius:"50%",background:COLORS.green,border:"3px solid white",boxShadow:`0 0 0 2px ${COLORS.green}`,marginTop:3}}/><div><span style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:COLORS.nightBlue,display:"block",marginBottom:2}}>{item.time}</span><span style={{fontSize:16,color:COLORS.textLight}}>{item[lang]}</span></div></div>)}</div></div></section>}

    /* ─── Mercatini ─── */
    function Mercatini(){const{lang}=useLang();const t=texts.mercatini;const[ref,inView]=useInView();const m=useIsMobile();return <section id="mercatini" ref={ref} style={{background:COLORS.white,padding:"80px 24px"}}><div style={{maxWidth:1200,margin:"0 auto",textAlign:"center"}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:COLORS.green,marginBottom:16}}>{t.title[lang]}</h2><p style={{fontSize:17,lineHeight:1.7,color:COLORS.textLight,marginBottom:40,maxWidth:700,margin:"0 auto 40px",whiteSpace:"pre-line"}}>{t.text[lang]}</p><div style={{display:m?"flex":"grid",gridTemplateColumns:m?"":"repeat(auto-fit, minmax(200px, 1fr))",gap:20,overflowX:m?"auto":"visible",paddingBottom:m?16:0}} className={m?"dj-carousel":""}>{t.vendors.map((vendor,i)=><div key={i} style={{flex:m?"0 0 200px":"",background:"white",borderRadius:16,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,.06)",border:"1px solid rgba(42,171,179,.1)",textAlign:"center",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(20px)",transition:`all .5s ease ${i*.1}s`}}><img src={vendor.logo} alt={vendor.name} style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",margin:"0 auto 12px",display:"block"}}/><h4 style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:COLORS.nightBlue,marginBottom:4}}>{vendor.name}</h4><p style={{fontSize:13,color:COLORS.teal,lineHeight:1.4}}>{vendor.desc[lang]}</p></div>)}</div></div></section>}/* ─── Workshop ─── */
    function Workshop(){const{lang}=useLang();const t=texts.workshop;const[ref,inView]=useInView();const m=useIsMobile();const icons={palette:Palette,shopping:ShoppingBag,wine:Wine};return <section id="workshop" ref={ref} style={{background:COLORS.white,padding:"80px 24px"}}><div style={{maxWidth:1000,margin:"0 auto",textAlign:"center"}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:COLORS.green,marginBottom:8}}>{t.title[lang]}</h2><p style={{fontSize:15,color:COLORS.teal,fontWeight:700,marginBottom:48}}>{t.subtitle[lang]}</p><div style={{display:"flex",flexDirection:m?"column":"row",gap:24}}>{t.cards.map((card,i)=>{const Ic=icons[card.icon];return <div key={i} style={{flex:1,background:"white",borderRadius:20,padding:32,boxShadow:"0 4px 24px rgba(0,0,0,.08)",border:"2px solid rgba(42,171,179,.15)",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(30px)",transition:`all .6s ease ${i*.15}s`}}><div style={{width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${COLORS.teal},${COLORS.orange})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Ic size={28} color="white"/></div><h3 style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:COLORS.nightBlue,marginBottom:4}}>{typeof card.title==="object"?card.title[lang]:card.title}</h3><p style={{fontSize:13,color:COLORS.teal,fontWeight:700,marginBottom:12}}>{typeof card.by==="object"?card.by[lang]:card.by}</p><p style={{fontSize:15,lineHeight:1.6,color:COLORS.textLight}}>{card.desc[lang]}</p><div style={{marginTop:16,fontFamily:"'Fredoka One',cursive",fontSize:20,color:COLORS.orange}}>10€</div></div>})}</div></div></section>}

    /* ─── Come arrivare ─── */
    function ComeArrivare(){const{lang}=useLang();const t=texts.comeArrivare;const[ref,inView]=useInView();const m=useIsMobile();return <section id="come-arrivare" ref={ref} style={{background:COLORS.white,padding:"80px 24px"}}><div style={{maxWidth:1000,margin:"0 auto"}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:COLORS.green,textAlign:"center",marginBottom:48}}>{t.title[lang]}</h2><div style={{display:"flex",flexDirection:m?"column":"row",gap:24,marginBottom:40}}><div style={{flex:1,background:"white",borderRadius:20,padding:32,boxShadow:"0 4px 24px rgba(0,0,0,.08)",border:"2px solid rgba(42,171,179,.15)",textAlign:"center",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(20px)",transition:"all .6s ease"}}><img src="public/assets/bus.webp" alt="Bus" className="float-slow" style={{width:160,height:160,objectFit:"contain",margin:"0 auto 20px",display:"block"}}/><h3 style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:COLORS.nightBlue,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Bus size={20} color={COLORS.teal}/>{t.bus.title[lang]}</h3><p style={{fontSize:15,color:COLORS.textLight,lineHeight:1.6}}>{t.bus.info[lang]}</p></div><div style={{flex:1,background:"white",borderRadius:20,padding:32,boxShadow:"0 4px 24px rgba(0,0,0,.08)",border:"2px solid rgba(42,171,179,.15)",textAlign:"center",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(20px)",transition:"all .6s ease .15s"}}><img src="public/assets/car.webp" alt="Auto" className="float-slow" style={{width:160,height:160,objectFit:"contain",margin:"0 auto 20px",display:"block"}}/><h3 style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:COLORS.nightBlue,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Car size={20} color={COLORS.teal}/>{t.auto.title[lang]}</h3><p style={{fontSize:15,color:COLORS.textLight,fontWeight:700,marginBottom:4}}>{t.auto.address}</p><p style={{fontSize:14,color:COLORS.teal}}>{t.auto.parking[lang]}</p></div></div><div style={{borderRadius:20,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.1)"}}><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2782.5!2d13.7638!3d45.7097!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x477b1bc14e0db5ed%3A0x8e1eea1bfa2f8e1b!2sAvalon%20Wellness%20%26%20Spa!5e0!3m2!1sit!2sit!4v1700000000000" width="100%" height={m?250:300} style={{border:0,display:"block"}} allowFullScreen loading="lazy" title="Avalon Wellness Spa"/></div></div></section>}

    /* ─── Prezzi ─── */
    function Prezzi(){const{lang}=useLang();const t=texts.prezzi;const[ref,inView]=useInView();const m=useIsMobile();return <section id="prezzi" ref={ref} style={{background:COLORS.white,padding:"80px 24px 100px"}}><div style={{maxWidth:800,margin:"0 auto",textAlign:"center"}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:COLORS.green,marginBottom:48}}>{t.title[lang]}</h2><div style={{display:"flex",flexDirection:m?"column":"row",gap:16,flexWrap:"wrap",justifyContent:"center"}}>{t.items.map((item,i)=>{const hl=i===0||i===2;return <div key={i} style={{flex:m?"none":"0 0 calc(50% - 8px)",background:"rgba(42,171,179,.06)",borderRadius:20,padding:28,border:hl?`2px solid ${COLORS.orange}`:"2px solid rgba(42,171,179,.15)",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(20px)",transition:`all .5s ease ${i*.1}s`}}><h3 style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:COLORS.nightBlue,marginBottom:4}}>{typeof item.name==="object"?item.name[lang]:item.name}</h3><div style={{fontFamily:"'Fredoka One',cursive",fontSize:32,color:COLORS.orange,marginBottom:8}}>{typeof item.price==="object"?item.price[lang]:item.price}</div><p style={{fontSize:14,color:"rgba(51,51,51,.7)",lineHeight:1.5}}>{item.desc[lang]}</p></div>})}</div><div style={{marginTop:48}}><a href="#form" className="cta-btn" style={{fontSize:20}}>{t.cta[lang]}</a></div></div></section>}

    /* ─── DJ Cards ─── */
    function DJCard({dj,i,inView}){return <div style={{width:180,minWidth:180,background:"rgba(42,171,179,.06)",borderRadius:16,padding:24,textAlign:"center",border:"1px solid rgba(42,171,179,.15)",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(20px)",transition:`all .5s ease ${i*.1}s`}}><div style={{width:80,height:80,borderRadius:"50%",background:"rgba(42,171,179,.1)",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}><Music size={32} color={COLORS.orange}/></div><h4 style={{fontFamily:"'Fredoka One',cursive",color:COLORS.nightBlue,fontSize:18,marginBottom:4}}>{dj.name}</h4><p style={{color:COLORS.teal,fontSize:13,fontWeight:600}}>{dj.time}</p></div>}
    function SpecialGuestCard({lang,inView,i,t}){return <div style={{maxWidth:300,margin:"0 auto 40px",textAlign:"center",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(20px)",transition:`all .5s ease ${i*.1}s`}}><img src="public/assets/special_guest.webp" alt="Special Guest" style={{width:120,height:120,borderRadius:"50%",objectFit:"cover",margin:"0 auto 16px",display:"block",border:`4px solid ${COLORS.orange}`}}/><h4 style={{fontFamily:"'Fredoka One',cursive",color:COLORS.orange,fontSize:18,marginBottom:4,lineHeight:1.3}}>{t.specialGuest[lang]}</h4><p style={{color:"rgba(51,51,51,.5)",fontSize:13,lineHeight:1.4}}>{t.specialGuestSub[lang]}</p></div>}

    /* ─── Musica ─── */
    function Musica(){const{lang}=useLang();const t=texts.musica;const[ref,inView]=useInView();const m=useIsMobile();const djs=[{name:"DJ 1",time:"12:00 – 14:00"},{name:"DJ 2",time:"14:00 – 16:00"},{name:"DJ 3",time:"16:00 – 18:00"},{name:"DJ 4",time:"18:00 – 20:00"}];const specialCard=<SpecialGuestCard lang={lang} inView={inView} i={0} t={t}/>;const djCards=djs.map((dj,i)=><DJCard key={i} dj={dj} i={i} inView={inView}/>);const bgImg="public/assets/mobile/music.webp";return <section id="musica" ref={ref} style={{position:"relative",backgroundImage:m?"url('"+bgImg+"')":"none",backgroundSize:m?"contain":"auto",backgroundPosition:"bottom center",backgroundRepeat:"no-repeat",backgroundColor:COLORS.white,minHeight:m?"100vh":"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:m?"60px 24px 300px":"80px 24px 40px"}}><div style={{maxWidth:1000,width:"100%",position:"relative",zIndex:2}}><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:m?26:36,color:COLORS.green,textAlign:"center",marginBottom:16,maxWidth:600,marginLeft:"auto",marginRight:"auto",lineHeight:1.3}}>{t.title[lang]}</h2><p style={{fontSize:16,lineHeight:1.7,color:COLORS.textLight,textAlign:"center",maxWidth:600,margin:"0 auto 48px",whiteSpace:"pre-line"}}>{t.desc[lang]}</p>{specialCard}{m?<div className="dj-carousel">{djCards}</div>:<div style={{display:"flex",gap:20,justifyContent:"center",flexWrap:"wrap"}}>{djCards}</div>}</div></section>}

    /* ─── Form ─── */
    function FormSection(){const{lang}=useLang();const t=texts.form;const[ref,inView]=useInView();const m=useIsMobile();const[fd,setFd]=useState({name:"",email:"",phone:"",people:""});const[errors,setErrors]=useState({});const[submitted,setSubmitted]=useState(false);const validate=()=>{const e={};if(!fd.name.trim())e.name=t.errors.name[lang];if(!fd.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/))e.email=t.errors.email[lang];if(!fd.phone.trim())e.phone=t.errors.phone[lang];if(!fd.people)e.people=t.errors.people[lang];setErrors(e);return !Object.keys(e).length};const handleSubmit=ev=>{ev.preventDefault();if(validate())setSubmitted(true)};const is={width:"100%",padding:"14px 18px",borderRadius:12,border:"2px solid rgba(0,0,0,.15)",background:"rgba(255,255,255,.85)",color:COLORS.textLight,fontFamily:"'Nunito',sans-serif",fontSize:16,outline:"none",transition:"border-color .3s"};const ls={color:COLORS.textLight,fontSize:14,fontWeight:600,marginBottom:6,display:"block"};const tc=COLORS.green;const sc="rgba(51,51,51,.7)";
    return <section id="form" ref={ref} style={{backgroundImage:m?"url('public/assets/mobile/form.webp')":"none",backgroundSize:m?"contain":"auto",backgroundPosition:"bottom center",backgroundRepeat:"no-repeat",backgroundColor:COLORS.white,padding:m?"80px 24px 360px":"80px 24px",minHeight:m?"100vh":"auto"}}><div style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}>{submitted?<div style={{opacity:inView?1:0,transition:"opacity .5s"}}><div style={{width:80,height:80,borderRadius:"50%",background:COLORS.teal,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px"}}><Check size={40} color="white"/></div><p style={{color:COLORS.textLight,fontSize:18,lineHeight:1.6}}>{t.success[lang]}</p></div>:<><h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:30,color:tc,marginBottom:12}}>{t.title[lang]}</h2><p style={{color:sc,fontSize:15,marginBottom:40,lineHeight:1.5}}>{t.subtitle[lang]}</p><form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:20,textAlign:"left"}}><div><label style={ls}>{t.name[lang]} *</label><input type="text" value={fd.name} onChange={e=>setFd({...fd,name:e.target.value})} placeholder={t.name[lang]} style={{...is,borderColor:errors.name?"#ff6b6b":undefined}}/>{errors.name&&<span style={{color:"#ff6b6b",fontSize:12,marginTop:4,display:"block"}}>{errors.name}</span>}</div><div><label style={ls}>{t.email[lang]} *</label><input type="email" value={fd.email} onChange={e=>setFd({...fd,email:e.target.value})} placeholder={t.email[lang]} style={{...is,borderColor:errors.email?"#ff6b6b":undefined}}/>{errors.email&&<span style={{color:"#ff6b6b",fontSize:12,marginTop:4,display:"block"}}>{errors.email}</span>}</div><div><label style={ls}>{t.phone[lang]} *</label><input type="tel" value={fd.phone} onChange={e=>setFd({...fd,phone:e.target.value})} placeholder={t.phone[lang]} style={{...is,borderColor:errors.phone?"#ff6b6b":undefined}}/>{errors.phone&&<span style={{color:"#ff6b6b",fontSize:12,marginTop:4,display:"block"}}>{errors.phone}</span>}</div><div><label style={ls}>{t.people[lang]} *</label><select value={fd.people} onChange={e=>setFd({...fd,people:e.target.value})} style={{...is,appearance:"none",cursor:"pointer",borderColor:errors.people?"#ff6b6b":undefined}}><option value="" style={{background:"white"}}>—</option>{[...Array(10)].map((_,i)=><option key={i+1} value={i+1} style={{background:"white"}}>{i+1}</option>)}</select>{errors.people&&<span style={{color:"#ff6b6b",fontSize:12,marginTop:4,display:"block"}}>{errors.people}</span>}</div><button type="submit" className="cta-btn" style={{width:"100%",marginTop:8,fontSize:18,padding:"16px 36px"}}>{t.submit[lang]}</button></form></>}</div></section>}

    /* ─── Footer ─── */
    function Footer(){const{lang}=useLang();const t=texts.footer;const m=useIsMobile();return <footer style={{background:COLORS.white,padding:"48px 24px 24px",borderTop:"1px solid rgba(0,0,0,.1)"}}><div style={{maxWidth:1000,margin:"0 auto",display:"flex",flexDirection:m?"column":"row",gap:40,alignItems:m?"center":"flex-start",textAlign:m?"center":"left"}}><div style={{flex:1}}><img src="public/assets/logo.svg" alt="Electronic Picnic" style={{height:56,marginBottom:12}}/><p style={{color:"rgba(51,51,51,.5)",fontSize:14}}>1 Maggio 2026 — Carso, Trieste</p></div><div style={{flex:1}}><h4 style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:COLORS.nightBlue,marginBottom:12}}>Social</h4><a href="https://instagram.com/electronic_picnic" target="_blank" rel="noopener noreferrer" style={{color:COLORS.teal,textDecoration:"none",display:"flex",alignItems:"center",gap:8,justifyContent:m?"center":"flex-start"}}><Instagram size={18}/>{t.social}</a></div><div style={{flex:1}}><h4 style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:COLORS.nightBlue,marginBottom:12}}>{t.partners[lang]}</h4><p style={{color:"rgba(51,51,51,.5)",fontSize:14}}>{t.partnerList}</p></div></div><div style={{maxWidth:1000,margin:"32px auto 0",paddingTop:24,borderTop:"1px solid rgba(0,0,0,.1)",textAlign:"center"}}><p style={{color:"rgba(51,51,51,.3)",fontSize:12}}>© 2026 Electronic Picnic — ON CIRCLE Music</p></div></footer>}

    /* ─── App ─── */
    function App(){const[lang,setLang]=useState("it");return <LangContext.Provider value={{lang,setLang}}><div style={{minHeight:"100vh"}}><Navbar/><Hero/><Concetto/><Programma/><Mercatini/><Workshop/><ComeArrivare/><Prezzi/><Musica/><FormSection/><Footer/></div></LangContext.Provider>}

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
